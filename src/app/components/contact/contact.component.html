<section id="contacto" class="contact">
    <div class="container">
        <h2 class="section-title">Contáctanos</h2>
        <p class="section-subtitle">Estamos listos para preparar tus postres especiales</p>
        <div class="contact-content">
            <div class="contact-info">
                <div class="contact-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <h3>Ubicación</h3>
                        <p>Bogotá, Colombia</p>
                    </div>
                </div>
                <div class="contact-item">
                    <i class="fas fa-phone"></i>
                    <div>
                        <h3>Teléfono / WhatsApp</h3>
                        <p>+57 324 3076563</p>
                        <a href="https://wa.me/573243076563" target="_blank" class="whatsapp-link">Enviar mensaje</a>
                    </div>
                </div>
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <h3>Email</h3>
                        <p>ventas&#64;lospostresdesarita.com</p>
                    </div>
                </div>
                <div class="contact-item">
                    <i class="fas fa-clock"></i>
                    <div>
                        <h3>Horarios de Atención</h3>
                        <p>Lunes a viernes: 8:00 a.m. – 6:00 p.m.</p>
                        <p>Sábados: 9:00 a.m. – 1:00 p.m.</p>
                    </div>
                </div>
            </div>
            <div class="contact-form">
                <form>
                    <input type="text" id="ws-nombre" placeholder="Tu Nombre Completo" required>
                    <input type="email" id="ws-email" placeholder="Tu Email" required>
                    <input type="tel" id="ws-telefono" placeholder="Tu Teléfono (opcional)">
                    <textarea id="ws-mensaje" placeholder="Tu Mensaje (cuéntanos sobre tu celebración o pedido especial)" rows="5" required></textarea>
                    <button type="submit" class="submit-button">Enviar Mensaje</button>
                </form>
            </div>
        </div>
    </div>
</section>
