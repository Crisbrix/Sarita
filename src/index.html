<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Miel y Vainilla - Deliciosos Postres Artesanales</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Miel y Vainilla: deliciosos postres artesanales con cheesecake, cupcakes, bowls de frutas y más. Catálogo de postres y regalos en Colombia.">
  <meta name="keywords" content="postres artesanales, cheesecake, cupcakes, bowls de frutas, amigurumis, cajas de postres, miel y vainilla">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#FF6B9D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Miel y Vainilla">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #FF6B9D, #FF8EAC);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .preloader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .preloader-icon {
      color: white;
      font-size: 2.5rem;
      opacity: 0.5;
      margin-bottom: 0.5rem;
    }
    .preloader-text {
      color: white;
      font-family: 'Dancing Script', cursive;
      font-weight: 700;
      font-size: 3rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
    }
    .preloader-sub {
      color: rgba(255,255,255,0.8);
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }
    .preloader-bar {
      width: 160px;
      height: 3px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      margin-top: 1.5rem;
      overflow: hidden;
    }
    .preloader-bar-inner {
      width: 30%;
      height: 100%;
      background: white;
      border-radius: 2px;
      animation: preloaderLoad 1.5s ease-in-out infinite;
    }
    @keyframes preloaderLoad {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
  </style>
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.getElementById('preloader').classList.add('hidden');
      }, 600);
    });
  </script>
</head>
<body>
  <div id="preloader" class="preloader">
    <div class="preloader-icon"><i class="fas fa-birthday-cake"></i></div>
    <div class="preloader-text">Miel y Vainilla</div>
    <div class="preloader-sub">Postres Artesanales</div>
    <div class="preloader-bar">
      <div class="preloader-bar-inner"></div>
    </div>
  </div>
  <app-root></app-root>
</body>
</html>
